name: Deploy

# Deployment is GATED on the full production contract. It only runs on main and
# only after build, typecheck, schema generation, and evals all pass.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  gate:
    name: Production Contract Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pnpm install --frozen-lockfile
      - name: Verify production (full gate + report)
        run: pnpm verify:production
      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-reports/*.md
          if-no-files-found: ignore

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: gate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (placeholder)
        run: |
          echo "All production gates passed. Wire your deploy target here."
          echo "Runtime: apps/agent-runtime | Web: apps/web | Support: apps/api-python"
