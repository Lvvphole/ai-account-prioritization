name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security & Observability Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate schemas
        run: pnpm generate:schemas

      # Build so the security/observability verifiers can resolve workspace dist.
      - name: Build
        run: pnpm build

      # Gate 1: no committed secrets (Rule #30).
      - name: Secret scan
        run: pnpm scan:secrets

      # Gate 2: Prisma stays excluded (Rule #28).
      - name: Check no Prisma
        run: pnpm check:no-prisma

      # Gate 3: RBAC / approval policy / PII redaction package.
      - name: Verify security package
        run: pnpm verify:security

      # Gate 4: PII-safe in-product observability package.
      - name: Verify observability package
        run: pnpm verify:observability
